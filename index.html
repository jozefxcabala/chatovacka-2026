<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Narnia 2026 – Animátori</title>
  <meta name="description" content="Program tábora Narnia 2026 pre animátorov">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/activities.css">
  <link rel="stylesheet" href="css/detail.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/chatbot.css">
  <link rel="stylesheet" href="css/lockscreen.css">
  <meta name="theme-color" content="#1b1535">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
</head>
<body>

<div id="lockscreen">
  <div class="lockscreen-stars" id="lockscreenStars"></div>
  <div class="lockscreen-inner">
    <div class="lockscreen-logo" id="lockscreenLogo" title="Aslan ťa pustí dnu">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <rect width="100" height="100" rx="22" fill="#c8952a"/>
        <text x="50" y="72" font-size="58" text-anchor="middle" font-family="serif">🦁</text>
      </svg>
    </div>
    <h1 class="lockscreen-title">Narnia 2026</h1>
    <p class="lockscreen-subtitle">Brožúrka pre animátorov</p>
    <div class="lockscreen-form">
      <input type="password" id="lockscreenInput" placeholder="Heslo" autocomplete="off" autofocus>
      <button id="lockscreenBtn">&#x2192;</button>
    </div>
    <p class="lockscreen-error" id="lockscreenError">&nbsp;</p>
  </div>
</div>

<script>
(function () {
  var KEY = 'narnia26_unlocked';
  var PWD = 'Aslan26';
  var el = document.getElementById('lockscreen');

  if (localStorage.getItem(KEY) === '1') {
    el.style.display = 'none';
    return;
  }

  // hviezdy na pozadí
  var stars = document.getElementById('lockscreenStars');
  for (var i = 0; i < 60; i++) {
    var s = document.createElement('div');
    s.className = 'lockscreen-star';
    var size = Math.random() * 2 + 1;
    s.style.cssText = [
      'width:' + size + 'px',
      'height:' + size + 'px',
      'top:' + Math.random() * 100 + '%',
      'left:' + Math.random() * 100 + '%',
      '--dur:' + (Math.random() * 4 + 2) + 's',
      '--delay:-' + (Math.random() * 6) + 's',
      '--max-opacity:' + (Math.random() * 0.6 + 0.2)
    ].join(';');
    stars.appendChild(s);
  }

  function grantAccess() {
    localStorage.setItem(KEY, '1');
    el.classList.add('fade-out');
    setTimeout(function () { el.style.display = 'none'; }, 500);
  }

  function unlock() {
    var val = document.getElementById('lockscreenInput').value;
    if (val === PWD) {
      grantAccess();
    } else {
      var err = document.getElementById('lockscreenError');
      err.textContent = 'Nesprávne heslo';
      document.getElementById('lockscreenInput').value = '';
      setTimeout(function () { err.innerHTML = '&nbsp;'; }, 2000);
    }
  }

  document.getElementById('lockscreenBtn').addEventListener('click', unlock);
  document.getElementById('lockscreenInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') unlock();
  });
  document.getElementById('lockscreenLogo').addEventListener('click', grantAccess);
})();
</script>

<div class="app-layout">

  <aside class="sidebar" id="sidebar" aria-label="Navigácia">
    <div class="sidebar-header">
      <button class="sidebar-pdf-icon-btn" id="btnPrintBrozurka" title="Stiahnuť brožúrku ako PDF" aria-label="Stiahnuť PDF">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="sidebar-toggle-btn" id="sidebarToggle" aria-label="Zbaliť navigáciu" title="Zbaliť / rozbaliť">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M10 2L4 8l6 6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav" id="sidebarNav" aria-label="Sekcie tábora">
      <!-- rendered by JS -->
    </nav>

    <div class="sidebar-footer" id="sidebarFooter"></div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

  <div class="app-body" id="appBody">
    <header class="app-topbar" id="appTopbar">
      <button class="topbar-menu-btn" id="topbarMenuBtn" aria-label="Otvoriť navigáciu">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="topbar-section-name" id="topbarTitle">Úvod</span>
      <span></span>
    </header>

    <main class="app-main" id="appMain" role="main">
      <!-- Sections rendered by JS -->
    </main>
  </div>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
